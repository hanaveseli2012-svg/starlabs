canvas.width=W;canvas.height=H;

function resize(){
 var s=Math.min(window.innerWidth/W,window.innerHeight/H);
 canvas.style.width=(W*s)+'px';
 canvas.style.height=(H*s)+'px';
}
resize();window.addEventListener('resize',resize);

var keys={},mouse={x:0,y:0,clicked:false,down:false};

window.addEventListener('keyup',function(e){keys[e.key.toLowerCase()]=false});
canvas.addEventListener('mousemove',function(e){var r=canvas.getBoundingClientRect();mouse.x=(e.clientX-r.left)*(W/r.width);mouse.y=(e.clientY-r.top)*(H/r.height)});
canvas.addEventListener('mousedown',function(){mouse.down=true;mouse.clicked=true});
canvas.addEventListener('mouseup',function(){mouse.down=false});

var Sound={ctx:null};
Sound.init=function(){try{this.ctx=new(window.AudioContext||window.webkitAudioContext)()}catch(e){}};
Sound.tone=function(f,t,d,v,s){
 if(!this.ctx)this.init();if(!this.ctx)return;
 try{var o=this.ctx.createOscillator(),g=this.ctx.createGain();o.type=t;o.frequency.setValueAtTime(f,this.ctx.currentTime);if(s)o.frequency.linearRampToValueAtTime(f+s,this.ctx.currentTime+d);g.gain.setValueAtTime(v||0.12,this.ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,this.ctx.currentTime+d);o.connect(g);g.connect(this.ctx.destination);o.start();o.stop(this.ctx.currentTime+d)}catch(e){}
};
Sound.collect=function(){this.tone(880,'sine',0.1,0.1,200);setTimeout(function(){Sound.tone(1100,'sine',0.08,0.06)},60)};
Sound.click=function(){this.tone(600,'sine',0.06,0.06)};
Sound.success=function(){this.tone(523,'sine',0.12,0.12);setTimeout(function(){Sound.tone(659,'sine',0.1,0.1)},80);setTimeout(function(){Sound.tone(784,'sine',0.15,0.15)},160)};
Sound.error=function(){this.tone(200,'sawtooth',0.2,0.08,-50)};
Sound.levelUp=function(){this.tone(440,'sine',0.12,0.1);setTimeout(function(){Sound.tone(554,'sine',0.1,0.08)},80);setTimeout(function(){Sound.tone(659,'sine',0.1,0.08)},160);setTimeout(function(){Sound.tone(880,'sine',0.18,0.15)},240)};
Sound.badge=function(){this.tone(660,'triangle',0.15,0.1);setTimeout(function(){Sound.tone(880,'triangle',0.12,0.08)},100);setTimeout(function(){Sound.tone(1100,'triangle',0.15,0.12)},200)};
Sound.buzz=function(){this.tone(150,'square',0.12,0.06)};
Sound.type=function(){this.tone(800,'sine',0.02,0.03)};

var particles=[],bgStars=[];
for(var i=0;i<80;i++){bgStars.push({x:Math.random()*W,y:Math.random()*H,r:0.5+Math.random()*1.5,s:0.2+Math.random()*0.8,o:0.3+Math.random()*0.7})}

function spawnP(x,y,n,color){
 color=color||CC.cyan;
 for(var i=0;i<n;i++){var a=Math.random()*Math.PI*2,s=1+Math.random()*5;particles.push({x:x,y:y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,c:color,life:25+Math.random()*25,ml:35,sz:2+Math.random()*6})}
}

function shuffle(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1)),t=a[i];a[i]=a[j];a[j]=t}return a}

function getLB(){try{return JSON.parse(localStorage.getItem('sl_lb')||'[]')}catch(e){return[]}}

function Tx(t,x,y,s,c,al,b){
 ctx.fillStyle=c||CC.text;ctx.textAlign=al||'center';
 ctx.font=(b!==false?'bold ':'')+s+'px "Segoe UI",system-ui,sans-serif';
 ctx.fillText(t,x,y);
}
function GTx(t,x,y,s,c,al){
 ctx.save();ctx.shadowColor=c||CC.cyan;ctx.shadowBlur=s*0.5;
 ctx.fillStyle=c||CC.cyan;ctx.textAlign=al||'center';
 ctx.font='bold '+s+'px "Segoe UI",system-ui,sans-serif';
 ctx.fillText(t,x,y);ctx.shadowBlur=0;ctx.restore();
}
function Pn(x,y,w,h,c,bc){
 c=c||CC.panel;bc=bc||CC.panelBdr;
 var g=ctx.createLinearGradient(x,y,x,y+h);
 g.addColorStop(0,c);g.addColorStop(1,'rgba(10,15,30,0.9)');
 ctx.fillStyle=g;ctx.strokeStyle=bc;ctx.lineWidth=1.5;
 ctx.beginPath();ctx.roundRect(x,y,w,h,14);ctx.fill();ctx.stroke();
 var ig=ctx.createLinearGradient(x,y,x,y+h);
 ig.addColorStop(0,'rgba(0,200,255,0.04)');ig.addColorStop(1,'rgba(0,200,255,0)');
 ctx.fillStyle=ig;ctx.beginPath();ctx.roundRect(x,y,w,h,14);ctx.fill();
}
function Btn(x,y,w,h,t,c,hv){
 c=c||CC.cyan;
 ctx.fillStyle=hv?'rgba(0,200,255,0.2)':'rgba(0,200,255,0.06)';
 ctx.strokeStyle=hv?c:'rgba(0,200,255,0.3)';ctx.lineWidth=hv?2.5:1.5;
 ctx.beginPath();ctx.roundRect(x,y,w,h,12);ctx.fill();ctx.stroke();
 if(hv){ctx.shadowColor=c;ctx.shadowBlur=15;ctx.fillStyle='rgba(0,200,255,0.2)';ctx.beginPath();ctx.roundRect(x,y,w,h,12);ctx.fill();ctx.shadowBlur=0}
 ctx.fillStyle=hv?'#fff':c;Tx(t,x+w/2,y+h/2+7,hv?17:16,ctx.fillStyle,'center',true);
}
function Prog(x,y,w,h,p,c){
 c=c||CC.green;ctx.fillStyle='rgba(255,255,255,0.06)';ctx.beginPath();ctx.roundRect(x,y,w,h,h/2);ctx.fill();
 if(p>0){var g=ctx.createLinearGradient(x,0,x+w*p,0);g.addColorStop(0,c);g.addColorStop(1,c.replace('b9','8a').replace('f5','e5'));ctx.fillStyle=g;ctx.beginPath();ctx.roundRect(x,y,w*p,h,h/2);ctx.fill()}
 ctx.strokeStyle='rgba(255,255,255,0.1)';ctx.lineWidth=1;ctx.beginPath();ctx.roundRect(x,y,w,h,h/2);ctx.stroke();
}

 shL2:function(){this.l2.qs=shuffle(this.l2.pool.slice()).slice(0,8)},

  if(sc==='l1')this.iL1();
