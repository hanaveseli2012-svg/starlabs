// Maze generation for Level 1
function genMaze(mw,mh,cs){
 var gw=Math.floor(mw/cs),gh=Math.floor(mh/cs);
 var grid=[];for(var y=0;y<gh;y++){grid[y]=[];for(var x=0;x<gw;x++)grid[y][x]={t:true,r:true,b:true,l:true,v:false}}
 var st=[],cx=1,cy=1;grid[cy][cx].v=true;st.push([cx,cy]);
 while(st.length>0){
  var cur=st[st.length-1],cx2=cur[0],cy2=cur[1];
  var nb=[];
  if(cx2>0&&!grid[cy2][cx2-1].v)nb.push([cx2-1,cy2,'l','r']);
  if(cx2<gw-1&&!grid[cy2][cx2+1].v)nb.push([cx2+1,cy2,'r','l']);
  if(cy2>0&&!grid[cy2-1][cx2].v)nb.push([cx2,cy2-1,'t','b']);
  if(cy2<gh-1&&!grid[cy2+1][cx2].v)nb.push([cx2,cy2+1,'b','t']);
  if(nb.length>0){
   var n=nb[Math.floor(Math.random()*nb.length)];
   grid[cy2][cx2][n[2]]=false;grid[n[1]][n[0]][n[3]]=false;
   grid[n[1]][n[0]].v=true;st.push([n[0],n[1]]);
  }else{st.pop()}
 }
 // Open some extra passages for playability
 for(var y=0;y<gh;y++)for(var x=0;x<gw;x++){
  if(x<gw-1&&Math.random()<0.12){grid[y][x].r=false;grid[y][x+1].l=false}
  if(y<gh-1&&Math.random()<0.12){grid[y][x].b=false;grid[y+1][x].t=false}
 }
 return grid;
}
